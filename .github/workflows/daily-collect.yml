name: Daily AI Knowledge Collect

on:
  schedule:
    - cron: '0 8 * * *'  # UTC 08:00 = 北京时间 16:00
  workflow_dispatch:

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pipeline
        env:
          LLM_PROVIDER: ${{ secrets.LLM_PROVIDER }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DASHSCOPE_API_KEY: ${{ secrets.QWEN_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python pipeline/pipeline.py --sources github,rss --limit 20 --verbose

      - name: Validate articles
        run: |
          if ls knowledge/articles/*.json 1>/dev/null 2>&1; then
            python hooks/validate_json.py knowledge/articles/*.json
            python hooks/check_quality.py knowledge/articles/*.json
          else
            echo "No article files to validate."
          fi

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add knowledge/articles/ knowledge/raw/

          if git diff --cached --quiet; then
            echo "No new data to commit."
            exit 0
          fi

          ARTICLE_COUNT=$(find knowledge/articles -name '*.json' ! -name 'index.json' | wc -l)
          DATE=$(date +%Y-%m-%d)
          git commit -m "collect: ${DATE} — ${ARTICLE_COUNT} articles"
          git push
